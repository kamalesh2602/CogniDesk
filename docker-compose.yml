version: "3.9"

services:

  mongodb:
    image: mongo:8
    container_name: cognidesk-mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db


  qdrant:
    image: qdrant/qdrant:latest
    container_name: cognidesk-qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage


  backend:
    build:
      context: ./server

    container_name: cognidesk-backend

    restart: unless-stopped

    env_file:
      - ./server/.env.docker

    depends_on:
      - mongodb
      - qdrant

    ports:
      - "8000:8000"

    volumes:
      - ./server/uploads:/app/uploads


  frontend:
    build:
      context: ./client

    container_name: cognidesk-frontend

    restart: unless-stopped

    env_file:
      - ./client/.env.docker

    depends_on:
      - backend

    ports:
      - "5173:5173"


volumes:
  mongo_data:
  qdrant_data: