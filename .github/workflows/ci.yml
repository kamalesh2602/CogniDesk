name: CogniDesk CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync

      - name: Verify Backend Imports
        run: python -m compileall .



  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build



  docker:

    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t cognidesk-backend ./server

      - name: Build Frontend Docker Image
        run: docker build -t cognidesk-frontend ./client